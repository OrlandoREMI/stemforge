# stemforge redis hardening — requirepass is passed via CLI from REDIS_PASSWORD
# env var (see docker-compose.yml) so the secret never lives on disk.

protected-mode yes
bind 0.0.0.0

maxmemory 512mb
maxmemory-policy allkeys-lru

# Disable dangerous commands.
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command DEBUG ""
