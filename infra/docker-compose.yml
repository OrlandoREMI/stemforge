services:
  redis:
    image: redis:7-alpine
    volumes:
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["sh", "-c", "exec redis-server /etc/redis/redis.conf --requirepass \"$$REDIS_PASSWORD\""]

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ../data:/data

  download-service:
    build:
      context: ..
      dockerfile: services/download-service/Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ../data:/data

  separation-service:
    build:
      context: ..
      dockerfile: services/separation-service/Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ../data:/data

  frontend:
    build:
      context: ../services/frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api-gateway
